<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carta para Itzel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=EB+Garamond:ital@0;1&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0b0d;--parchment-light:#f3e5c8;--parchment-dark:#ebd8b0;
  --burnt:#3d2314;--burnt-deep:#1a0f08;--lavender:#b9a4d4;
  --lily:#f5f0e8;--heart:#ff8fab;
}
html,body{width:100%;min-height:100vh;background:var(--bg);}
.carta-root{
  background:var(--bg);min-height:100vh;width:100%;position:relative;
  overflow:hidden;font-family:'EB Garamond',serif;color:var(--lily);
}
.petal-layer{position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden;}
.petal{
  position:absolute;top:-5%;border-radius:60% 0 60% 0;
  background:var(--lavender);opacity:0.75;animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(0) translateX(0) rotate(0deg);}
  100%{transform:translateY(110vh) translateX(var(--drift,20px)) rotate(360deg);}
}

/* Sobre */
.envelope-screen{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:28px;z-index:5;
  transition:opacity 0.9s ease,visibility 0.9s ease;
}
.envelope-screen.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.envelope-btn{
  background:none;border:none;cursor:pointer;display:flex;
  flex-direction:column;align-items:center;gap:22px;
}
.envelope-svg{
  width:160px;height:auto;
  filter:drop-shadow(0 0 30px rgba(217,138,168,0.35));
  transition:transform 0.4s ease;
}
.envelope-btn:hover .envelope-svg{transform:translateY(-6px) scale(1.03);}
.open-label{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.4rem;
  letter-spacing:0.04em;color:var(--lily);border:1px solid var(--lavender);
  padding:10px 26px;border-radius:999px;
  transition:background 0.3s ease,color 0.3s ease;
}
.envelope-btn:hover .open-label{background:var(--lavender);color:var(--burnt-deep);}

/* Carta */
.letter-stage{
  position:relative;z-index:4;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:60px 20px;opacity:0;transform:scale(0.92);
  transition:opacity 1.1s ease,transform 1.1s ease;
}
.letter-stage.show{opacity:1;transform:scale(1);}

/* Ramos */
.bouquet{
  position:fixed;bottom:-20px;width:140px;z-index:3;
  animation:floatAnim 6s ease-in-out infinite;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,0.5));
}
.bouquet.left{left:0;}
.bouquet.right{right:0;transform:scaleX(-1);}
@keyframes floatAnim{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-18px);}
}
.bouquet.right{animation-delay:1.2s;}

/* Pergamino */
.parchment{
  position:relative;max-width:620px;width:100%;padding:64px 48px;
  background:radial-gradient(ellipse at center,var(--parchment-light) 0%,var(--parchment-dark) 75%,#d9c098 100%);
  border:2px solid var(--burnt);border-radius:6px;
  box-shadow:
    inset 0 0 18px 10px rgba(61,35,20,0.55),
    inset 0 0 60px 25px rgba(26,15,8,0.35),
    0 0 50px rgba(0,0,0,0.6),
    0 0 0 8px rgba(26,15,8,0.15);
}
.frog-corner{position:absolute;width:64px;z-index:2;}
.frog-corner.top-left{top:-26px;left:-22px;transform:rotate(-15deg);}
.frog-corner.top-right{top:-26px;right:-22px;transform:rotate(15deg) scaleX(-1);}

.letter-title{
  font-family:'Cormorant Garamond',serif;font-weight:600;font-size:2.1rem;
  color:var(--burnt-deep);text-align:center;margin:0 0 28px;letter-spacing:0.02em;
}
.letter-body{
  font-family:'EB Garamond',serif;font-size:1.18rem;line-height:2;
  color:#2c1a0d;white-space:pre-wrap;min-height:80px;
}
.cursor{
  display:inline-block;width:2px;background:#2c1a0d;
  margin-left:2px;animation:blink 0.9s step-end infinite;
}
@keyframes blink{50%{opacity:0;}}

.placeholder-note{
  margin-top:30px;padding-top:18px;border-top:1px dashed var(--burnt);
  font-family:'EB Garamond',serif;font-style:italic;font-size:0.95rem;
  color:#6b4a2a;text-align:center;
}

/* Botón música */
.music-toggle{
  position:fixed;bottom:22px;right:22px;z-index:6;
  width:52px;height:52px;border-radius:50%;
  background:var(--burnt);border:1px solid var(--lavender);
  color:var(--lily);font-size:1.3rem;display:flex;
  align-items:center;justify-content:center;
  cursor:pointer;transition:transform 0.3s ease;
}
.music-toggle:hover{transform:scale(1.08);}
.music-toggle.muted{opacity:0.45;}

@media(max-width:720px){
  .bouquet{width:90px;}
  .parchment{padding:46px 26px;}
  .letter-title{font-size:1.7rem;}
  .letter-body{font-size:1.05rem;}
}
@media(prefers-reduced-motion:reduce){
  .petal,.bouquet{animation:none!important;}
}
</style>
</head>
<body>
<div class="carta-root" id="cartaRoot">

  <div class="petal-layer" id="petalLayer"></div>

  <!-- Ramo izquierdo -->
  <svg class="bouquet left" viewBox="0 0 120 180" xmlns="http://www.w3.org/2000/svg">
    <path d="M60 180 L60 70" stroke="#3d6b3f" stroke-width="4" fill="none"/>
    <ellipse cx="40" cy="55" rx="16" ry="24" fill="#d98aa8" transform="rotate(-20 40 55)"/>
    <ellipse cx="65" cy="40" rx="14" ry="22" fill="#f5f0e8" transform="rotate(10 65 40)"/>
    <ellipse cx="85" cy="58" rx="15" ry="23" fill="#b9a4d4" transform="rotate(25 85 58)"/>
    <circle cx="40" cy="55" r="6" fill="#fff3df"/>
    <circle cx="65" cy="40" r="6" fill="#ffe9c2"/>
    <circle cx="85" cy="58" r="6" fill="#e9def0"/>
    <circle cx="55" cy="25" r="3" fill="#9c7fc4"/>
    <circle cx="60" cy="20" r="3" fill="#9c7fc4"/>
    <circle cx="65" cy="25" r="3" fill="#9c7fc4"/>
    <circle cx="50" cy="18" r="3" fill="#9c7fc4"/>
    <circle cx="70" cy="18" r="3" fill="#9c7fc4"/>
  </svg>

  <!-- Ramo derecho -->
  <svg class="bouquet right" viewBox="0 0 120 180" xmlns="http://www.w3.org/2000/svg">
    <path d="M60 180 L60 70" stroke="#3d6b3f" stroke-width="4" fill="none"/>
    <ellipse cx="40" cy="55" rx="16" ry="24" fill="#d98aa8" transform="rotate(-20 40 55)"/>
    <ellipse cx="65" cy="40" rx="14" ry="22" fill="#f5f0e8" transform="rotate(10 65 40)"/>
    <ellipse cx="85" cy="58" rx="15" ry="23" fill="#b9a4d4" transform="rotate(25 85 58)"/>
    <circle cx="40" cy="55" r="6" fill="#fff3df"/>
    <circle cx="65" cy="40" r="6" fill="#ffe9c2"/>
    <circle cx="85" cy="58" r="6" fill="#e9def0"/>
    <circle cx="55" cy="25" r="3" fill="#9c7fc4"/>
    <circle cx="60" cy="20" r="3" fill="#9c7fc4"/>
    <circle cx="65" cy="25" r="3" fill="#9c7fc4"/>
    <circle cx="50" cy="18" r="3" fill="#9c7fc4"/>
    <circle cx="70" cy="18" r="3" fill="#9c7fc4"/>
  </svg>

  <!-- Pantalla del sobre -->
  <div class="envelope-screen" id="envelopeScreen">
    <button class="envelope-btn" id="openBtn" type="button">
      <svg class="envelope-svg" viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="15" width="190" height="120" rx="6" fill="#2a1810" stroke="#b9a4d4" stroke-width="2"/>
        <path d="M5 20 L100 90 L195 20" fill="none" stroke="#b9a4d4" stroke-width="2.5"/>
        <path d="M5 130 L75 70" stroke="#1a0f08" stroke-width="1.5" fill="none"/>
        <path d="M195 130 L125 70" stroke="#1a0f08" stroke-width="1.5" fill="none"/>
        <circle cx="100" cy="80" r="11" fill="#ff8fab"/>
        <path d="M100 76 c-2.5 -4 -9 -2 -9 2.5 c0 4 9 8 9 8 s9 -4 9 -8 c0 -4.5 -6.5 -6.5 -9 -2.5 z" fill="#fff"/>
      </svg>
      <span class="open-label">Abrir para Itzel 💖</span>
    </button>
  </div>

  <!-- Pantalla de la carta -->
  <div class="letter-stage" id="letterStage">
    <div class="parchment">

      <!-- Ranitas decorativas -->
      <svg class="frog-corner top-left" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="40" cy="48" rx="26" ry="20" fill="#6fbf73"/>
        <circle cx="22" cy="22" r="11" fill="#6fbf73"/>
        <circle cx="58" cy="22" r="11" fill="#6fbf73"/>
        <path d="M18 20 c1 -4 8 -3 8 1" fill="#ff8fab"/>
        <path d="M62 20 c-1 -4 -8 -3 -8 1" fill="#ff8fab"/>
        <circle cx="22" cy="22" r="5" fill="#fff"/>
        <circle cx="58" cy="22" r="5" fill="#fff"/>
        <path d="M28 56 q12 10 24 0" stroke="#264d28" stroke-width="2" fill="none"/>
      </svg>
      <svg class="frog-corner top-right" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="40" cy="48" rx="26" ry="20" fill="#6fbf73"/>
        <circle cx="22" cy="22" r="11" fill="#6fbf73"/>
        <circle cx="58" cy="22" r="11" fill="#6fbf73"/>
        <path d="M18 20 c1 -4 8 -3 8 1" fill="#ff8fab"/>
        <path d="M62 20 c-1 -4 -8 -3 -8 1" fill="#ff8fab"/>
        <circle cx="22" cy="22" r="5" fill="#fff"/>
        <circle cx="58" cy="22" r="5" fill="#fff"/>
        <path d="M28 56 q12 10 24 0" stroke="#264d28" stroke-width="2" fill="none"/>
      </svg>

      <h1 class="letter-title">Para mi Itzel</h1>
      <div class="letter-body" id="letterBody"></div>

      <p class="placeholder-note">
        Gracias por cada sonrisa, cada momento y cada detalle. Te amo más de lo que las palabras pueden explicar y felices 3 meses mi amor
      </p>
    </div>
  </div>

  <!-- Botón música -->
  <button class="music-toggle muted" id="musicToggle" type="button" title="Agrega tu mp3 en MUSIC_SRC para activar">🔇</button>
  <audio id="bgMusic" loop></audio>

</div>

<script>
(function(){

  /* ====================================================
     EDITA AQUÍ:
     1. LETTER_TEXT  → pega el texto de tu carta
     2. MUSIC_SRC    → ruta a tu archivo mp3 (opcional)
  ==================================================== */
  var LETTER_TEXT =
"Mi querida Itzel:\n\n" +
"Estoy muy feliz de estar contigo. A veces me pongo a pensar en todo lo que hemos vivido y me sorprende lo rápido que han pasado estos tres meses. \n" +
"Parece que fue ayer cuando comenzamos esta historia, pero en tan poco tiempo me di cuenta de algo muy importante: quiero estar contigo siempre.\n" +
"Estoy agradecido con Diosito por habernos vuelto a cruzar una vez más. Entre tantas personas y tantos caminos, nos dio una nueva oportunidad de encontrarnos,\n" +
"pero esta vez no para quedarnos como simples amigos, sino para descubrir todo el amor que había guardado entre  nosotros. Y sinceramente, no podría estar más feliz y agradecido por eso.\n\n" +
"Cada día que pasa me haces más feliz y me das más razones para seguir soñando con el momento en que por fin estemos juntos. Saber que ese día se acerca me llena de emoción, porque no veo la hora de poder abrazarte,tomar tu mano y crear recuerdos a tu lado que duren toda la vida.\n\n" +
"Quiero llenar nuestra historia de aventuras, de risas, de viajes, de momentos simples que se vuelvan inolvidables solo porque estamos juntos. Quiero conocer cada parte de ti, seguir enamorándome de ti todos los días y acompañarte en cada etapa de tu vida.\n\n" +
"Te amo con todo mi corazón y estoy emocionado por todo lo que nos espera. Porque si en solo tres meses has logrado hacerme sentir tanto amor, no puedo imaginar todas las cosas hermosas que viviremos cuando por fin estemos juntos. Y si algo tengo claro, es que quiero seguir construyendo recuerdos contigo,seguir creciendo contigo y seguir amándote por el resto de mi vida. ❤️ \n\n" +
"Con todo mi cariño Tony.";

  var MUSIC_SRC = ""; // ejemplo: "musica.mp3"
  /* ==================================================== */


  /* --- Música --- */
  var audio = document.getElementById('bgMusic');
  var musicBtn = document.getElementById('musicToggle');
  var musicReady = false;
  var isPlaying = false;

  if (MUSIC_SRC) {
    audio.src = MUSIC_SRC;
    musicReady = true;
    musicBtn.classList.remove('muted');
    musicBtn.textContent = '🔇';
  }

  musicBtn.addEventListener('click', function(){
    if (!musicReady) return;
    if (isPlaying) {
      audio.pause();
      musicBtn.textContent = '🔇';
    } else {
      audio.play().catch(function(){});
      musicBtn.textContent = '🔊';
    }
    isPlaying = !isPlaying;
  });


  /* --- Lluvia de pétalos --- */
  var petalLayer = document.getElementById('petalLayer');
  for (var i = 0; i < 26; i++) {
    var p = document.createElement('div');
    p.className = 'petal';
    var size = 6 + Math.random() * 10;
    p.style.width = size + 'px';
    p.style.height = (size * 1.3) + 'px';
    p.style.left = (Math.random() * 100) + '%';
    p.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
    var dur = 7 + Math.random() * 8;
    p.style.animationDuration = dur + 's';
    p.style.animationDelay = (Math.random() * dur) + 's';
    p.style.background = Math.random() > 0.5 ? '#b9a4d4' : '#d4c0e8';
    petalLayer.appendChild(p);
  }


  /* --- Abrir sobre y escribir carta --- */
  var envelopeScreen = document.getElementById('envelopeScreen');
  var letterStage = document.getElementById('letterStage');
  var letterBody = document.getElementById('letterBody');
  var openBtn = document.getElementById('openBtn');

  function typeWriter(text, el, speed) {
    var i = 0;
    var cursor = document.createElement('span');
    cursor.className = 'cursor';
    cursor.innerHTML = '&nbsp;';

    function step() {
      el.textContent = text.slice(0, i);
      el.appendChild(cursor);
      if (i <= text.length) {
        i++;
        setTimeout(step, speed);
      } else {
        cursor.remove();
      }
    }
    step();
  }

  openBtn.addEventListener('click', function(){
    envelopeScreen.classList.add('hidden');
    setTimeout(function(){
      letterStage.classList.add('show');
      setTimeout(function(){
        typeWriter(LETTER_TEXT, letterBody, 28);
      }, 500);
      if (musicReady) {
        audio.play().catch(function(){});
        isPlaying = true;
        musicBtn.textContent = '🔊';
      }
    }, 300);
  });

})();
</script>
</body>
</html>
